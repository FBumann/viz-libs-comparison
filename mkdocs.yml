site_name: viz-libs-comparison
site_description: Decision-grade comparison of Plotly, Altair, and Bokeh
site_url: https://fbumann.github.io/viz-libs-comparison/
repo_url: https://github.com/FBumann/viz-libs-comparison
repo_name: FBumann/viz-libs-comparison

site_dir: _site
docs_dir: docs
use_directory_urls: false

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Smoke test: assets/notebooks/00_smoke_test.html
  - 01 — Dispatch: assets/notebooks/01_dispatch.html
  - 02 — Faceted scenarios: assets/notebooks/02_faceted.html
  - 03 — Performance at scale: assets/notebooks/03_performance.html
  - 04 — Load duration + heatmap: assets/notebooks/04_distribution.html

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FBumann/viz-libs-comparison
